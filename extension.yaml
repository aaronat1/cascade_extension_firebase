name: firestore-cascade-delete
version: 0.1.2
specVersion: v1beta
displayName: Firestore Cascade Delete
description: >-
  When a Firestore document is deleted, this extension automatically deletes all
  of its subcollections recursively — something Firestore does not do natively.
  Prevents orphaned data and keeps your database clean.
license: Apache-2.0
stage: stable
icon: icon.png
author:
  authorName: aaronat1
  authorUrl: https://github.com/aaronat1
sourceUrl: https://github.com/aaronat1/firestore-cascade-delete
billingRequired: true

roles:
  - role: datastore.user
    reason: Required to list and delete subcollection documents recursively.

resources:
  - name: cascadeDeleteL1
    type: firebaseextensions.v1beta.function
    description: Triggers cascade delete when a top-level document is deleted ({c1}/{d1}).
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}

  - name: cascadeDeleteL2
    type: firebaseextensions.v1beta.function
    description: Triggers cascade delete when a depth-2 document is deleted.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}

  - name: cascadeDeleteL3
    type: firebaseextensions.v1beta.function
    description: Triggers cascade delete when a depth-3 document is deleted.
    properties:
      location: ${LOCATION}
      runtime: nodejs20
      eventTrigger:
        eventType: providers/cloud.firestore/eventTypes/document.delete
        resource: projects/${PROJECT_ID}/databases/(default)/documents/{c1}/{d1}/{c2}/{d2}/{c3}/{d3}

params:
  - param: LOCATION
    label: Cloud Functions location
    description: >-
      Where do you want to deploy the functions created for this extension?
    type: select
    options:
      - label: Iowa (us-central1)
        value: us-central1
      - label: South Carolina (us-east1)
        value: us-east1
      - label: Northern Virginia (us-east4)
        value: us-east4
      - label: Los Angeles (us-west2)
        value: us-west2
      - label: Salt Lake City (us-west3)
        value: us-west3
      - label: Las Vegas (us-west4)
        value: us-west4
      - label: Belgium (europe-west1)
        value: europe-west1
      - label: London (europe-west2)
        value: europe-west2
      - label: Frankfurt (europe-west3)
        value: europe-west3
      - label: Zurich (europe-west6)
        value: europe-west6
      - label: Taiwan (asia-east1)
        value: asia-east1
      - label: Hong Kong (asia-east2)
        value: asia-east2
      - label: Tokyo (asia-northeast1)
        value: asia-northeast1
      - label: Osaka (asia-northeast2)
        value: asia-northeast2
      - label: Seoul (asia-northeast3)
        value: asia-northeast3
      - label: Mumbai (asia-south1)
        value: asia-south1
      - label: Singapore (asia-southeast1)
        value: asia-southeast1
      - label: Jakarta (asia-southeast2)
        value: asia-southeast2
      - label: Sydney (australia-southeast1)
        value: australia-southeast1
    required: true
    immutable: true

  - param: MAX_DEPTH
    label: Maximum subcollection depth to delete
    description: >-
      How many levels deep to cascade the delete. A value of 5 means the extension
      will delete subcollections up to 5 levels below the deleted document.
      Higher values may increase execution time for deeply nested data.
    type: select
    options:
      - label: "2"
        value: "2"
      - label: "3"
        value: "3"
      - label: "4"
        value: "4"
      - label: "5"
        value: "5"
      - label: "6"
        value: "6"
      - label: "8"
        value: "8"
      - label: "10"
        value: "10"
    default: "5"
    required: true

  - param: BATCH_SIZE
    label: Delete batch size
    description: >-
      Number of documents to delete per batch operation (max 500).
      Lower values are safer for large subcollections but slower.
    type: select
    options:
      - label: "50"
        value: "50"
      - label: "100"
        value: "100"
      - label: "200"
        value: "200"
      - label: "500"
        value: "500"
    default: "100"
    required: true

  - param: EXCLUDED_COLLECTIONS
    label: Excluded top-level collections (optional)
    description: >-
      Comma-separated list of top-level collection names where cascade delete
      should NOT be applied.
    type: string
    required: false
